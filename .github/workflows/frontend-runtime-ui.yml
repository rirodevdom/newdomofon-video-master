name: Frontend runtime UI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/prepare-frontend-source.sh'
      - 'scripts/patch-manual-auto-managed-tokens.py'
      - 'scripts/patch-system-managed-token-ui.py'
      - 'scripts/patch-auto-assign-all-cameras-ui.py'
      - 'scripts/patch-camera-device-ui.py'
      - 'scripts/patch-camera-token-workflow.py'
      - '.github/workflows/frontend-runtime-ui.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate source preparation script
        run: |
          bash -n scripts/prepare-frontend-source.sh
          python3 -m py_compile \
            scripts/patch-manual-auto-managed-tokens.py \
            scripts/patch-system-managed-token-ui.py \
            scripts/patch-auto-assign-all-cameras-ui.py \
            scripts/patch-camera-device-ui.py \
            scripts/patch-camera-token-workflow.py

      - name: Build frontend from clean checkout
        working-directory: frontend
        run: |
          npm ci --include=dev >/tmp/frontend-npm-ci.log 2>&1 || {
            cat /tmp/frontend-npm-ci.log
            exit 1
          }
          npm run build >/tmp/frontend-build.log 2>&1 || {
            cat /tmp/frontend-build.log
            exit 1
          }
          cat /tmp/frontend-build.log

      - name: Verify latest UI features coexist
        run: |
          grep -q 'managedTokenForm.auto_assign_new_cameras' frontend/src/views/AdminView.vue
          grep -q 'toggleManagedTokenAutoAssign' frontend/src/views/AdminView.vue
          grep -q 'token.auto_assign_new_cameras' frontend/src/views/AdminView.vue
          grep -q 'Автоматически назначать всем камерам' frontend/src/views/AdminView.vue
          grep -q 'Авто всем камерам' frontend/src/views/AdminView.vue
          grep -q 'существующие назначения сохранены' frontend/src/views/AdminView.vue
          ! grep -q 'value="links"' frontend/src/views/AdminView.vue
          ! grep -q 'AdminLinksPanel' frontend/src/views/AdminView.vue
          grep -q 'openTokenDialog(camera)' frontend/src/views/CamerasView.vue
          grep -q 'saveTokenAssignments' frontend/src/views/CamerasView.vue
          grep -q 'cameraForm.managed_token_ids' frontend/src/views/DevicesView.vue
          grep -q 'CameraTokenLinksPanel' frontend/src/views/PlayerView.vue
          grep -q 'Ссылки доступа по токенам' frontend/src/components/CameraTokenLinksPanel.vue
          grep -q 'SYSTEM_MANAGED_TOKEN_ID' frontend/src/components/AdminLinksPanel.vue
          grep -q 'Запись ведётся' frontend/src/views/PlayerView.vue
          grep -q '<th>Комментарий</th>' frontend/src/views/DevicesView.vue
          ! grep -q 'status-json' frontend/src/views/PlayerView.vue
