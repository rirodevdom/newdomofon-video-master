name: Frontend runtime UI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/prepare-frontend-source.sh'
      - 'scripts/patch-manual-auto-managed-tokens.py'
      - 'scripts/patch-system-managed-token-ui.py'
      - 'scripts/patch-camera-device-ui.py'
      - '.github/workflows/frontend-runtime-ui.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate source preparation script
        run: |
          bash -n scripts/prepare-frontend-source.sh
          python3 -m py_compile \
            scripts/patch-manual-auto-managed-tokens.py \
            scripts/patch-system-managed-token-ui.py \
            scripts/patch-camera-device-ui.py

      - name: Build frontend from clean checkout
        working-directory: frontend
        run: |
          npm ci --include=dev
          npm run build

      - name: Verify latest UI features coexist
        run: |
          grep -q 'managedTokenForm.auto_assign_new_cameras' frontend/src/views/AdminView.vue
          grep -q 'toggleManagedTokenAutoAssign' frontend/src/views/AdminView.vue
          grep -q 'token.auto_assign_new_cameras' frontend/src/views/AdminView.vue
          grep -q 'SYSTEM_MANAGED_TOKEN_ID' frontend/src/components/AdminLinksPanel.vue
          grep -q 'Запись ведётся' frontend/src/views/PlayerView.vue
          grep -q '<th>Комментарий</th>' frontend/src/views/DevicesView.vue
          ! grep -q 'status-json' frontend/src/views/PlayerView.vue
