name: SmartYard public HTTPS origin

on:
  pull_request:
    paths:
      - 'scripts/repair-public-https-origin.sh'
      - 'scripts/verify-smartyard-public-cors.sh'
      - '.github/workflows/smartyard-public-https-origin.yml'
      - 'integrations/smartyard-vue/README.md'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell interface
        run: |
          bash -n scripts/repair-public-https-origin.sh
          bash scripts/repair-public-https-origin.sh --help \
            | grep -q 'without a built-in deployment domain'

      - name: Prepare TLS fixture
        run: |
          cp deploy/nginx/newdomofon-video.conf /tmp/newdomofon-video.conf
          python3 - <<'PY'
          from pathlib import Path

          path = Path('/tmp/newdomofon-video.conf')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '    listen 80;\n',
              '    listen 80;\n    listen 443 ssl;\n',
              1,
          )
          text = text.replace(
              '    server_name _;\n',
              '    server_name 192.0.2.10 media.example.test _;\n',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY

          cat >/tmp/app.env <<'EOF'
          NODE_ENV=production
          APP_PUBLIC_URL=http://media.example.test
          SMARTYARD_PUBLIC_BASE_URL=http://media.example.test
          EOF

      - name: Derive URL from env and dry-run twice
        run: |
          before_env="$(sha256sum /tmp/app.env | awk '{print $1}')"
          before_conf="$(sha256sum /tmp/newdomofon-video.conf | awk '{print $1}')"

          for run in 1 2; do
            bash scripts/repair-public-https-origin.sh \
              --env-file /tmp/app.env \
              --site-conf /tmp/newdomofon-video.conf \
              --probe-address 192.0.2.10 \
              --test-origin https://client.example.test \
              --dry-run \
              | tee "/tmp/dry-run-$run.log"

            grep -q 'public_origin=https://media.example.test' "/tmp/dry-run-$run.log"
            grep -q 'public_host=media.example.test' "/tmp/dry-run-$run.log"
            grep -q 'DRY RUN passed' "/tmp/dry-run-$run.log"
            grep -q 'SmartYard-Vue changed=false' "/tmp/dry-run-$run.log"
          done

          test "$before_env" = "$(sha256sum /tmp/app.env | awk '{print $1}')"
          test "$before_conf" = "$(sha256sum /tmp/newdomofon-video.conf | awk '{print $1}')"

      - name: Accept an arbitrary deployment domain
        run: |
          cp /tmp/newdomofon-video.conf /tmp/other-domain.conf
          cp /tmp/app.env /tmp/other-domain.env

          bash scripts/repair-public-https-origin.sh \
            --env-file /tmp/other-domain.env \
            --site-conf /tmp/other-domain.conf \
            --public-url https://camera.customer.example:9443 \
            --dry-run \
            | tee /tmp/other-domain.log

          grep -q 'public_origin=https://camera.customer.example:9443' /tmp/other-domain.log
          grep -q 'public_host=camera.customer.example' /tmp/other-domain.log

      - name: Reject missing TLS listener without mutations
        run: |
          cp deploy/nginx/newdomofon-video.conf /tmp/no-tls.conf
          sed -i 's/server_name _;/server_name media.example.test _;/' /tmp/no-tls.conf
          cp /tmp/app.env /tmp/no-tls.env

          before_env="$(sha256sum /tmp/no-tls.env | awk '{print $1}')"
          before_conf="$(sha256sum /tmp/no-tls.conf | awk '{print $1}')"

          set +e
          output="$(
            bash scripts/repair-public-https-origin.sh \
              --env-file /tmp/no-tls.env \
              --site-conf /tmp/no-tls.conf \
              --dry-run 2>&1
          )"
          rc=$?
          set -e

          test "$rc" -ne 0
          grep -q 'no TLS Nginx server block was found' <<<"$output"
          test "$before_env" = "$(sha256sum /tmp/no-tls.env | awk '{print $1}')"
          test "$before_conf" = "$(sha256sum /tmp/no-tls.conf | awk '{print $1}')"
