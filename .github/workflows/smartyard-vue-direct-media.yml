name: SmartYard Vue direct media

on:
  pull_request:
    paths:
      - 'scripts/patch-smartyard-vue-newdomofon-media.py'
      - 'integrations/smartyard-vue/README.md'
      - '.github/workflows/smartyard-vue-direct-media.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NewDomofon
        uses: actions/checkout@v4
        with:
          path: newdomofon

      - name: Checkout upstream SmartYard-Vue
        uses: actions/checkout@v4
        with:
          repository: rosteleset/SmartYard-Vue
          ref: d4db9dc0b8ed104bd026fa7971b95ef399f251d3
          path: smartyard

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply media compatibility twice
        run: |
          python3 -m py_compile newdomofon/scripts/patch-smartyard-vue-newdomofon-media.py
          python3 newdomofon/scripts/patch-smartyard-vue-newdomofon-media.py --project-dir smartyard
          python3 newdomofon/scripts/patch-smartyard-vue-newdomofon-media.py --project-dir smartyard

          grep -q 'NEWDOMOFON_MEDIA_COMPAT_V1' smartyard/src/lib/player.ts
          grep -q 'NEWDOMOFON_MEDIA_COMPAT_V1' smartyard/src/hooks/useRanges.ts
          grep -q 'NEWDOMOFON_MEDIA_COMPAT_V1' smartyard/src/components/CustomControls.vue
          grep -q 'data-newdomofon-media="NEWDOMOFON_MEDIA_COMPAT_V1"' smartyard/src/components/VideoCard.vue
          grep -q 'data-newdomofon-media="NEWDOMOFON_MEDIA_COMPAT_V1"' smartyard/src/components/VideoModal.vue
          grep -q 'recording_status.json' smartyard/src/hooks/useRanges.ts
          grep -q 'archive-${fromMoment.unix()}-${duration}.mp4' smartyard/src/components/CustomControls.vue
          grep -q 'timestamp}-preview.mp4' smartyard/src/lib/player.ts

      - name: Build patched SmartYard-Vue
        working-directory: smartyard
        run: |
          npm install --global yarn@1.22.22
          yarn install --frozen-lockfile
          yarn build
