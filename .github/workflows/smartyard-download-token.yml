name: SmartYard download token compatibility

on:
  pull_request:
    paths:
      - 'backend/src/routes/internalSmartYard.ts'
      - 'backend/src/services/smartYardTokenCompatibility.ts'
      - 'backend/test/smartYardTokenCompatibility.test.ts'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - '.github/workflows/smartyard-download-token.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build
