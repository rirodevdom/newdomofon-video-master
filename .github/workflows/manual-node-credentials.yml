name: Manual node credentials

on:
  push:
    branches:
      - feature/manual-node-credentials
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: newdomofon
          POSTGRES_PASSWORD: ci_database_password
          POSTGRES_DB: newdomofon_video
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U newdomofon -d newdomofon_video"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: production
      BACKEND_PORT: 3000
      DATABASE_URL: postgres://newdomofon:ci_database_password@127.0.0.1:5432/newdomofon_video
      JWT_SECRET: ci_jwt_secret_value_with_more_than_thirty_two_characters
      MANAGED_CAMERA_TOKEN_SECRET: ci_managed_camera_token_secret_with_more_than_thirty_two_chars
      ADMIN_LOGIN: admin
      ADMIN_PASSWORD: ci_admin_password_2026
      CORS_ORIGIN: http://127.0.0.1
      TRUST_PROXY: 'true'
      APP_PUBLIC_URL: http://127.0.0.1
      SMARTYARD_PUBLIC_BASE_URL: http://127.0.0.1
      INTERNAL_DVR_SECRET: ci_internal_dvr_secret_with_more_than_thirty_two_chars
      NODE_REGISTRATION_TOKEN: ''

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Validate credential ownership
        run: |
          bash -n scripts/install-manual-node-credentials.sh
          bash -n scripts/install-master-manual-local-root.sh
          bash -n scripts/apply-managed-token-rollout.sh
          bash -n scripts/install-manual-auto-managed-tokens.sh
          bash -n scripts/deploy-master-with-manual-auto-tokens.sh

          python3 -m py_compile \
            scripts/fix-manual-token-resolver-variable.py \
            scripts/patch-archive-playback-window.py \
            scripts/patch-archive-seek-navigation.py \
            scripts/patch-device-owned-archive-storage.py \
            scripts/patch-managed-media-gateway.py \
            scripts/patch-manual-auto-managed-tokens.py \
            scripts/patch-system-managed-token-ui.py

          grep -q "master_url: z.string().url()" backend/src/routes/dvrServers.ts
          grep -q "node_id: z.string().uuid()" backend/src/routes/dvrServers.ts
          grep -q "agent_token: safeSecret" backend/src/routes/dvrServers.ts
          grep -q "media_secret: safeSecret" backend/src/routes/dvrServers.ts
          grep -q "credential_source: 'operator_supplied'" backend/src/routes/dvrServers.ts
          ! grep -q "function createSecret" backend/src/routes/dvrServers.ts

          grep -q 'v-model="form.master_url"' frontend/src/views/NodesView.vue
          grep -q 'v-model="form.node_id"' frontend/src/views/NodesView.vue
          grep -q 'v-model="form.agent_token"' frontend/src/views/NodesView.vue
          grep -q 'v-model="form.media_secret"' frontend/src/views/NodesView.vue
          grep -q 'Задать новые credentials' frontend/src/views/NodesView.vue

          grep -q 'Legacy self-registration disabled' \
            scripts/install-master-manual-local-root.sh
          grep -q 'NODE_REGISTRATION_TOKEN=""' \
            scripts/install-master-manual-local-root.sh

      - name: Validate deployment documentation
        run: |
          test -s README.md
          test -s INSTALL_MASTER.md
          test -s INSTALL_MASTER_LOCAL_ROOT.md
          test -s INSTALL_MASTER_FROM_ARCHIVE.md
          test -s INSTALL_MASTER_FROM_DIRECTORY.md
          test -s ROOT_RUNTIME_MASTER.md
          test -s docs/BAREMETAL_DEBIAN12.md
          test -s docs/MANUAL_NODE_REGISTRATION.md
          test -s docs/ENVIRONMENT.md
          test -s docs/DISK_PROTECTION.md
          test -s docs/AUTOMATIC_RTSP_GATEWAY.md

          grep -q 'Master больше не генерирует' README.md
          grep -q 'install-master-manual-local-root.sh' INSTALL_MASTER_LOCAL_ROOT.md
          grep -q 'NODE_REGISTRATION_TOKEN=' INSTALL_MASTER_FROM_ARCHIVE.md
          grep -q 'NODE_REGISTRATION_TOKEN=' INSTALL_MASTER_FROM_DIRECTORY.md
          grep -q 'специальный root-only runtime' ROOT_RUNTIME_MASTER.md
          grep -q 'Master больше не создаёт' docs/MANUAL_NODE_REGISTRATION.md
          grep -q 'Переменные окружения video master' docs/ENVIRONMENT.md

          ! grep -q 'Сохраните выданные' README.md
          ! grep -q 'node registration token и внутренние параметры' INSTALL_MASTER.md
          ! grep -q 'Получите credentials node на master' docs/BAREMETAL_DEBIAN12.md

      - name: Validate master environment template
        run: |
          for key in \
            NODE_ENV \
            BACKEND_PORT \
            DATABASE_URL \
            JWT_SECRET \
            ADMIN_LOGIN \
            ADMIN_PASSWORD \
            CORS_ORIGIN \
            TRUST_PROXY \
            NODE_COMMAND_POLL_LIMIT \
            APP_PUBLIC_URL \
            SMARTYARD_PUBLIC_BASE_URL \
            MEDIA_PUBLIC_BASE_URL \
            DVR_ENGINE_URL \
            PLAYBACK_TOKEN_TTL_SECONDS \
            INTERNAL_DVR_SECRET \
            NODE_REGISTRATION_TOKEN \
            MASTER_DISK_GUARD_PATHS \
            RTSP_GATEWAY_ENABLED \
            PUBLIC_EVENTS_INCLUDE_PASSIVE; do
              grep -q "^${key}=" deploy/env/master.env.example
              grep -q "${key}" docs/ENVIRONMENT.md
          done

          grep -qx 'NODE_REGISTRATION_TOKEN=' deploy/env/master.env.example
          ! grep -q 'CHANGE_TO_RANDOM_NODE_REGISTRATION_TOKEN' \
            deploy/env/master.env.example

      - name: Build backend
        working-directory: backend
        run: |
          npm ci --include=dev
          npm run build

      - name: Validate managed-token cryptography
        working-directory: backend
        run: |
          node --input-type=module <<'NODE'
          import {
            decryptManualManagedCameraToken,
            encryptManualManagedCameraToken,
            manualManagedCameraTokenDigest,
            validateManualManagedCameraToken
          } from './dist/services/manualManagedCameraToken.js';

          const token = 'manual-camera-token-ci-2026';
          const encrypted = encryptManualManagedCameraToken(token);
          if (encrypted.includes(token)) throw new Error('Ciphertext contains plaintext token');
          if (decryptManualManagedCameraToken(encrypted) !== token) throw new Error('Manual token round-trip failed');
          if (manualManagedCameraTokenDigest(token) !== manualManagedCameraTokenDigest(token)) {
            throw new Error('Manual token digest is not deterministic');
          }
          let reservedRejected = false;
          try { validateManualManagedCameraToken('m1.reserved-manual-token'); } catch { reservedRejected = true; }
          if (!reservedRejected) throw new Error('Reserved generated-token prefix was accepted');
          NODE

      - name: Apply migrations twice and verify schema invariants
        working-directory: backend
        run: |
          npm run migrate
          npm run migrate
          npm run seed

          node --input-type=module <<'NODE'
          import pg from 'pg';
          const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL });

          const systemToken = await pool.query(`
            SELECT id, is_active, expires_at, scopes, token_mode, auto_assign_new_cameras
              FROM managed_camera_tokens
             WHERE id = '00000000-0000-4000-8000-000000000001'::uuid
          `);
          if (systemToken.rowCount !== 1) throw new Error('System managed token is missing');
          const token = systemToken.rows[0];
          if (!token.is_active || token.expires_at !== null || token.token_mode !== 'generated') {
            throw new Error('System managed token invariants are invalid');
          }
          if (token.auto_assign_new_cameras !== false || !token.scopes.includes('camera') || !token.scopes.includes('events')) {
            throw new Error('System managed token scopes or flags are invalid');
          }

          const obsoleteIndex = await pool.query(`
            SELECT 1 FROM pg_indexes
             WHERE schemaname = 'public'
               AND indexname = 'uq_managed_camera_token_cameras_camera_id'
          `);
          if (obsoleteIndex.rowCount !== 0) throw new Error('Obsolete single-token-per-camera index still exists');

          const requiredColumns = await pool.query(`
            SELECT column_name
              FROM information_schema.columns
             WHERE table_schema = 'public'
               AND table_name = 'managed_camera_tokens'
               AND column_name IN (
                 'token_mode',
                 'manual_token_ciphertext',
                 'manual_token_digest',
                 'auto_assign_new_cameras'
               )
          `);
          if (requiredColumns.rowCount !== 4) throw new Error('Managed-token migration columns are incomplete');

          const requiredTriggers = await pool.query(`
            SELECT tgname
              FROM pg_trigger
             WHERE NOT tgisinternal
               AND tgname IN (
                 'trg_cameras_assign_system_managed_token',
                 'trg_managed_camera_token_replace_system',
                 'trg_managed_camera_token_restore_system',
                 'trg_managed_camera_tokens_protect_system'
               )
          `);
          if (requiredTriggers.rowCount !== 4) throw new Error('Managed-token trigger set is incomplete');

          await pool.end();
          NODE

      - name: Start backend and verify health
        working-directory: backend
        run: |
          node dist/index.js >/tmp/newdomofon-backend-ci.log 2>&1 &
          BACKEND_PID=$!
          trap 'kill "$BACKEND_PID" 2>/dev/null || true' EXIT

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/api/health >/tmp/backend-health.json; then
              cat /tmp/backend-health.json
              exit 0
            fi
            sleep 1
          done

          cat /tmp/newdomofon-backend-ci.log
          exit 1

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --include=dev
          npm run build
