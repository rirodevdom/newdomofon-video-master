name: Manual node credentials

on:
  push:
    branches:
      - feature/manual-node-credentials
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Validate credential ownership
        run: |
          bash -n scripts/install-manual-node-credentials.sh
          bash -n scripts/install-master-manual-local-root.sh

          grep -q "master_url: z.string().url()" backend/src/routes/dvrServers.ts
          grep -q "node_id: z.string().uuid()" backend/src/routes/dvrServers.ts
          grep -q "agent_token: safeSecret" backend/src/routes/dvrServers.ts
          grep -q "media_secret: safeSecret" backend/src/routes/dvrServers.ts
          grep -q "credential_source: 'operator_supplied'" backend/src/routes/dvrServers.ts
          ! grep -q "function createSecret" backend/src/routes/dvrServers.ts

          grep -q 'v-model="form.master_url"' frontend/src/views/NodesView.vue
          grep -q 'v-model="form.node_id"' frontend/src/views/NodesView.vue
          grep -q 'v-model="form.agent_token"' frontend/src/views/NodesView.vue
          grep -q 'v-model="form.media_secret"' frontend/src/views/NodesView.vue
          grep -q 'Задать новые credentials' frontend/src/views/NodesView.vue

          grep -q 'Legacy self-registration disabled' \
            scripts/install-master-manual-local-root.sh
          grep -q 'NODE_REGISTRATION_TOKEN=""' \
            scripts/install-master-manual-local-root.sh

      - name: Validate deployment documentation
        run: |
          test -s README.md
          test -s INSTALL_MASTER.md
          test -s INSTALL_MASTER_LOCAL_ROOT.md
          test -s INSTALL_MASTER_FROM_ARCHIVE.md
          test -s INSTALL_MASTER_FROM_DIRECTORY.md
          test -s ROOT_RUNTIME_MASTER.md
          test -s docs/BAREMETAL_DEBIAN12.md
          test -s docs/MANUAL_NODE_REGISTRATION.md
          test -s docs/ENVIRONMENT.md
          test -s docs/DISK_PROTECTION.md
          test -s docs/AUTOMATIC_RTSP_GATEWAY.md

          grep -q 'Master больше не генерирует' README.md
          grep -q 'install-master-manual-local-root.sh' INSTALL_MASTER_LOCAL_ROOT.md
          grep -q 'NODE_REGISTRATION_TOKEN=' INSTALL_MASTER_FROM_ARCHIVE.md
          grep -q 'NODE_REGISTRATION_TOKEN=' INSTALL_MASTER_FROM_DIRECTORY.md
          grep -q 'специальный root-only runtime' ROOT_RUNTIME_MASTER.md
          grep -q 'Master не генерирует' docs/MANUAL_NODE_REGISTRATION.md
          grep -q 'Полный справочник' docs/ENVIRONMENT.md

          ! grep -q 'Сохраните выданные' README.md
          ! grep -q 'node registration token и внутренние параметры' INSTALL_MASTER.md
          ! grep -q 'Получите credentials node на master' docs/BAREMETAL_DEBIAN12.md

      - name: Validate master environment template
        run: |
          for key in \
            NODE_ENV \
            BACKEND_PORT \
            DATABASE_URL \
            JWT_SECRET \
            ADMIN_LOGIN \
            ADMIN_PASSWORD \
            CORS_ORIGIN \
            TRUST_PROXY \
            NODE_COMMAND_POLL_LIMIT \
            APP_PUBLIC_URL \
            SMARTYARD_PUBLIC_BASE_URL \
            MEDIA_PUBLIC_BASE_URL \
            DVR_ENGINE_URL \
            PLAYBACK_TOKEN_TTL_SECONDS \
            INTERNAL_DVR_SECRET \
            NODE_REGISTRATION_TOKEN \
            MASTER_DISK_GUARD_PATHS \
            RTSP_GATEWAY_ENABLED \
            PUBLIC_EVENTS_INCLUDE_PASSIVE; do
            grep -q "^${key}=" deploy/env/master.env.example
            grep -q "${key}" docs/ENVIRONMENT.md
          done

          grep -qx 'NODE_REGISTRATION_TOKEN=' deploy/env/master.env.example
          ! grep -q 'CHANGE_TO_RANDOM_NODE_REGISTRATION_TOKEN' \
            deploy/env/master.env.example

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
