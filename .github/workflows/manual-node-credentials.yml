name: Manual node credentials

on:
  push:
    branches:
      - feature/manual-node-credentials
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Validate credential ownership
        run: |
          bash -n scripts/install-manual-node-credentials.sh
          grep -q "master_url: z.string().url()" backend/src/routes/dvrServers.ts
          grep -q "node_id: z.string().uuid()" backend/src/routes/dvrServers.ts
          grep -q "agent_token: safeSecret" backend/src/routes/dvrServers.ts
          grep -q "media_secret: safeSecret" backend/src/routes/dvrServers.ts
          grep -q "credential_source: 'operator_supplied'" backend/src/routes/dvrServers.ts
          ! grep -q "function createSecret" backend/src/routes/dvrServers.ts
          grep -q 'v-model="form.master_url"' frontend/src/views/NodesView.vue
          grep -q 'v-model="form.node_id"' frontend/src/views/NodesView.vue
          grep -q 'v-model="form.agent_token"' frontend/src/views/NodesView.vue
          grep -q 'v-model="form.media_secret"' frontend/src/views/NodesView.vue
          grep -q 'Задать новые credentials' frontend/src/views/NodesView.vue
      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
