name: Apply Moscow timezone README update

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/moscow-timezone
          fetch-depth: 0

      - name: Update timezone documentation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          old = '''Master и node должны иметь синхронизированное время.

```bash
timedatectl set-timezone UTC
systemctl enable --now systemd-timesyncd
timedatectl status
```'''
          new = '''Master и все video node должны использовать одну временную зону — **московское время** (`Europe/Moscow`). Это обеспечивает согласованные временные метки архива, событий, логов и токенов на всех серверах.

```bash
timedatectl set-timezone Europe/Moscow
systemctl enable --now systemd-timesyncd
timedatectl status
date '+%Y-%m-%d %H:%M:%S %Z %z'
```

Ожидаемая зона и смещение:

```text
Time zone: Europe/Moscow
MSK +0300
```

Проверьте эту настройку на master и на каждой video node. После изменения временной зоны перезапуск сервисов не требуется.'''
          if old not in text:
              raise SystemExit('Expected UTC block was not found in README.md')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit README and remove temporary workflow
        run: |
          rm -f .github/workflows/patch-readme-timezone.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md .github/workflows/patch-readme-timezone.yml
          git commit -m "Document Moscow timezone"
          git push origin HEAD:docs/moscow-timezone
